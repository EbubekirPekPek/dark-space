  bilgi/index.html
  Dark Space — Bilgi Ağacı

  CSS/JS path'leri: ../css/... ve ../js/...
-->
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Dark Space — Bilgi Ağacı">
  <meta name="theme-color" content="#08080d">

  <link rel="stylesheet" href="../css/design-system.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/pages.css">

  <style>
    /* Bilgi Ağacı özel düzeni */
    .knowledge-layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 0;
      height: calc(100vh - var(--topbar-height, 0px));
      overflow: hidden;
    }

    @media (max-width: 767px) {
      .knowledge-layout {
        grid-template-columns: 1fr;
        height: auto;
      }
      .knowledge-tree-panel {
        border-right: none;
        border-bottom: 1px solid var(--color-border-subtle);
      }
    }

    /* Sol Ağaç Paneli */
    .knowledge-tree-panel {
      border-right: 1px solid var(--color-border-subtle);
      overflow-y: auto;
      background: var(--color-bg-elevated);
      padding: var(--space-4) 0;
    }

    .tree-section-label {
      font-size: var(--text-xs);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: var(--tracking-widest);
      padding: var(--space-3) var(--space-4) var(--space-1);
    }

    .tree-item {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-4);
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
      cursor: pointer;
      border-radius: 0;
      transition: background var(--duration-fast), color var(--duration-fast);
      border-left: 2px solid transparent;
    }

    .tree-item:hover {
      background: var(--color-bg-overlay);
      color: var(--color-text-primary);
    }

    .tree-item.is-active {
      background: var(--color-accent-subtle);
      color: var(--color-accent);
      border-left-color: var(--color-accent);
      font-weight: var(--font-weight-semibold);
    }

    .tree-item-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.6;
      flex-shrink: 0;
    }

    /* Sağ İçerik Paneli */
    .knowledge-content-panel {
      overflow-y: auto;
      padding: var(--space-6) var(--space-8);
    }

    @media (max-width: 1023px) {
      .knowledge-content-panel {
        padding: var(--space-4);
      }
    }

    /* Kategori başlık alanı */
    .knowledge-breadcrumb {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      margin-bottom: var(--space-3);
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .knowledge-breadcrumb span + span::before {
      content: '›';
      margin-right: var(--space-2);
    }

    .knowledge-page-title {
      font-size: var(--text-2xl);
      font-weight: var(--font-weight-bold);
      color: var(--color-text-primary);
      margin-bottom: var(--space-2);
    }

    .knowledge-page-desc {
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
      margin-bottom: var(--space-6);
      line-height: var(--leading-relaxed);
    }

    /* Kategori kartları */
    .knowledge-cat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: var(--space-3);
      margin-bottom: var(--space-6);
    }

    .knowledge-cat-card {
      background: var(--color-bg-surface);
      border: 1px solid var(--color-border-default);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      cursor: pointer;
      transition: border-color var(--duration-fast), background var(--duration-fast), transform var(--duration-fast);
    }

    .knowledge-cat-card:hover {
      border-color: var(--color-accent);
      background: var(--color-bg-overlay);
      transform: translateY(-1px);
    }

    .knowledge-cat-card.is-selected {
      border-color: var(--color-accent);
      background: var(--color-accent-subtle);
    }

    .knowledge-cat-card-title {
      font-size: var(--text-sm);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-primary);
      margin-bottom: var(--space-1);
    }

    .knowledge-cat-card-desc {
      font-size: var(--text-xs);
      color: var(--color-text-secondary);
      line-height: var(--leading-relaxed);
    }

    /* Detay paneli */
    .knowledge-detail-panel {
      background: var(--color-bg-surface);
      border: 1px solid var(--color-border-default);
      border-radius: var(--radius-xl);
      padding: var(--space-6);
      margin-top: var(--space-4);
    }

    .knowledge-detail-title {
      font-size: var(--text-lg);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-primary);
      margin-bottom: var(--space-3);
    }

    .knowledge-detail-content {
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
      line-height: var(--leading-relaxed);
      margin-bottom: var(--space-4);
    }

    .knowledge-note-area {
      margin-top: var(--space-4);
      border-top: 1px solid var(--color-border-subtle);
      padding-top: var(--space-4);
    }

    .knowledge-note-area textarea {
      width: 100%;
      min-height: 100px;
      background: var(--color-bg-inset);
      border: 1px solid var(--color-border-default);
      border-radius: var(--radius-md);
      padding: var(--space-3);
      font-size: var(--text-sm);
      color: var(--color-text-primary);
      font-family: var(--font-family-base);
      resize: vertical;
      box-sizing: border-box;
    }

    .knowledge-note-area textarea:focus {
      outline: none;
      border-color: var(--color-border-focus);
    }

    .knowledge-placeholder {
      text-align: center;
      padding: var(--space-16) var(--space-8);
      color: var(--color-text-muted);
    }

    .knowledge-placeholder-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto var(--space-4);
      opacity: 0.4;
    }
  </style>
</head>

<strong>YouTube Shorts Ads:</strong> Dikey format, TikTok benzeri deneyim. Genç kitle için etkin bir kanal.`
          }
        ]
      },
      tiktok: {
        label: 'TikTok Ads',
        color: 'var(--color-tiktok)',
        desc: 'TikTok reklam formatları — Spark Ads, In-Feed ve premium yerleşimler.',
        categories: [
          {
            id: 'spark-ads',
            title: 'Spark Ads',
            desc: 'Organik TikTok içeriklerini reklama dönüştürme formatı.',
            content: `<strong>Ne Zaman Kullanılır:</strong> Organik olarak iyi performans göstermiş video içerikleri reklama dönüştürüldüğünde. Güven ve sosyal kanıt içerir.<br><br>
<strong>Avantaj:</strong> Normal kullanıcı paylaşımı gibi görünür. CTR genellikle standart In-Feed Ads'den yüksektir.<br><br>
<strong>İzin:</strong> İçerik sahibinden veya influencer'dan yetkilendirme alınması gerekir.`
          },
          {
            id: 'in-feed-ads',
            title: 'In-Feed Ads',
            desc: 'TikTok akışında organik içerikler arasında çıkan video reklamlar.',
            content: `<strong>Format:</strong> 9:16 dikey video, 5-60 saniye arası önerilir. Sessiz izlenmeye uygun altyazı zorunludur.<br><br>
<strong>İlk 3 Saniye:</strong> Kullanıcı ilk 3 saniyede geçmeye karar verir. Hook güçlü ve görsel olarak çarpıcı olmalıdır.<br><br>
<strong>Native Hissi:</strong> Aşırı üretilmiş içerikler TikTok'ta iyi performans göstermez. Gerçekçi, UGC (kullanıcı içeriği) tarzı reklamlar daha etkilidir.`
          },
          {
            id: 'topview',
            title: 'TopView',
            desc: 'Uygulamayı açınca çıkan premium tam ekran reklam formatı.',
            content: `<strong>Özellik:</strong> Kullanıcı TikTok'u açtığında ilk 3 saniye tam ekran gösterilir. En yüksek görünürlük formatıdır.<br><br>
<strong>Kullanım:</strong> Büyük kampanya lansmanları ve marka farkındalığı için uygundur. Yüksek CPM, büyük bütçe gerektirir.<br><br>
<strong>Süre:</strong> 5-60 saniye arası video yüklenebilir. Ses varsayılan olarak açıktır.`
          }
        ]
      },
      kreatif: {
        label: 'Kreatif',
        color: 'var(--color-accent)',
        desc: 'Reklam yaratıcılığının temelleri — hook, psikoloji, görsel ve copy.',
        categories: [
          {
            id: 'hook-turleri',
            title: 'Hook Türleri',
            desc: 'İlk 3 saniyede dikkat çeken açılış kalıpları.',
            content: `<strong>Soru Hook:</strong> "Neden reklamların %90'ı para kaybettirir?" — merak uyandırır.<br><br>
<strong>İddia Hook:</strong> "Bu yöntemle ROAS'ımı 3 katına çıkardım." — sosyal kanıt sunar.<br><br>
<strong>Problem Hook:</strong> "Kreatifin tükendi mi?" — empati kurar, izleyiciyi tanır.<br><br>
<strong>Görsel Hook:</strong> Şaşırtıcı görsel, beklenmedik renk veya hareketle başlama. Metin olmadan da çalışır.<br><br>
<strong>Rakam Hook:</strong> "47 müşteri bu hatayı yapıyor" — spesifik sayılar güven verir.`
          },
          {
            id: 'psikolojik-baskılayıcılar',
            title: 'Psikolojik Baskılayıcılar',
            desc: 'Karar verme sürecini etkileyen temel psikolojik tetikleyiciler.',
            content: `<strong>Kıtlık:</strong> "Son 3 yer kaldı" — kayıp korkusu (FOMO) harekete geçirir.<br><br>

<strong>Karşılıklılık:</strong> Ücretsiz değer ver → karşı taraf borçluluk hisseder.<br><br>

          },
          {
            id: 'gorsel-prensipler',
            title: 'Görsel Prensipler',
            desc: 'Dikkat çeken reklam görselleri için temel kurallar.',
            content: `<strong>Kontrast:</strong> Renk, boyut veya hareket kontrastı göz önce oraya gider. CTA butonu zıt renkte olmalı.<br><br>
<strong>Odak Noktası:</strong> Tek bir ana mesaj. Görsel kalabalıklaştıkça mesaj kaybolur.<br><br>
<strong>Yüz Psikolojisi:</strong> İnsan yüzü bakışı takip edilir. Yüzün baktığı yöne metin konulabilir.<br><br>
<strong>Platform Uyumu:</strong> Her platform kendi oranını sever. Meta → 1:1 veya 4:5, TikTok/Reels → 9:16.<br><br>
<strong>Metin Azlığı:</strong> Meta reklamlarda görselde çok fazla metin CTR'yi düşürür. Metin, başlık alanında kullanılmalı.`
          },
          {
            id: 'copy-yazimi',
            title: 'Copy Yazımı',
            desc: 'Reklam metni yazmanın temel çerçeveleri ve kalıpları.',
            content: `<strong>PAS Formülü:</strong> Problem → Agitasyon → Çözüm. Önce acıyı tanımla, büyüt, sonra çözümü sun.<br><br>
<strong>AIDA:</strong> Attention (Dikkat) → Interest (İlgi) → Desire (Arzu) → Action (Eylem).<br><br>
<strong>FAB:</strong> Feature (Özellik) → Advantage (Avantaj) → Benefit (Fayda). Özelliği değil faydayı sat.<br><br>
<strong>CTA (Harekete Geçirici):</strong> Net, tek ve aciliyet içermeli. "Hemen keşfet", "Ücretsiz dene", "Bugün başla" gibi ifadeler işe yarar.<br><br>

    let activePlatform = 'meta';
    let activeCategory = null;

    initApp((user) => {
      if (user) {
        const avatar = document.getElementById('userAvatar');
        const name = document.getElementById('userName');
        if (user.displayName) { name.textContent = user.displayName; avatar.textContent = user.displayName[0].toUpperCase(); }
        else if (user.email) { name.textContent = user.email.split('@')[0]; avatar.textContent = user.email[0].toUpperCase(); }
      }
      renderPlatform('meta');
      setupTreeNav();
    });

    function setupTreeNav() {
      document.querySelectorAll('.tree-item').forEach(item => {
        item.addEventListener('click', () => {
          document.querySelectorAll('.tree-item').forEach(i => i.classList.remove('is-active'));
          item.classList.add('is-active');
          activePlatform = item.dataset.platform;
          activeCategory = null;
          renderPlatform(activePlatform);
        });
        item.addEventListener('keydown', e => { if (e.key === 'Enter') item.click(); });
      });
    }

    function renderPlatform(platformKey) {
      const platform = KNOWLEDGE_DATA[platformKey];
      const panel = document.getElementById('contentPanel');
      if (!platform) return;

      panel.innerHTML = `
        <div class="knowledge-breadcrumb">
          <span>Bilgi Ağacı</span>
          <span>${platform.label}</span>
        </div>
        <h1 class="knowledge-page-title">${platform.label}</h1>
        <p class="knowledge-page-desc">${platform.desc}</p>

        <div class="knowledge-cat-grid" id="catGrid">
          ${platform.categories.map(cat => `
            <div class="knowledge-cat-card" data-cat="${cat.id}" tabindex="0" role="button">
              <div class="knowledge-cat-card-title">${cat.title}</div>
              <div class="knowledge-cat-card-desc">${cat.desc}</div>
            </div>
          `).join('')}
        </div>

        <div id="detailArea"></div>
      `;

      // Kategori kartlarına tıklama
      panel.querySelectorAll('.knowledge-cat-card').forEach(card => {
        card.addEventListener('click', () => {
          panel.querySelectorAll('.knowledge-cat-card').forEach(c => c.classList.remove('is-selected'));
          card.classList.add('is-selected');
          const catId = card.dataset.cat;
          const cat = platform.categories.find(c => c.id === catId);
          if (cat) renderCategoryDetail(cat, platform.label);
        });
        card.addEventListener('keydown', e => { if (e.key === 'Enter') card.click(); });
      });
    }

    function renderCategoryDetail(cat, platformLabel) {
      const detailArea = document.getElementById('detailArea');
      detailArea.innerHTML = `
        <div class="knowledge-detail-panel">
          <div class="knowledge-breadcrumb" style="margin-bottom:var(--space-2);">
            <span>Bilgi Ağacı</span>
            <span>${platformLabel}</span>
            <span>${cat.title}</span>
          </div>
          <div class="knowledge-detail-title">${cat.title}</div>
          <div class="knowledge-detail-content">${cat.content}</div>

          <div class="knowledge-note-area">
            <div style="font-size:var(--text-xs);font-weight:var(--font-weight-semibold);color:var(--color-text-muted);text-transform:uppercase;letter-spacing:var(--tracking-widest);margin-bottom:var(--space-2);">Notlarım</div>
            <textarea placeholder="Bu konuya dair notlarını buraya ekle..." rows="4"></textarea>
            <div style="margin-top:var(--space-2);display:flex;gap:var(--space-2);">
              <button class="btn btn-primary btn-sm" onclick="saveNote(this)">Not Ekle</button>
              <span style="font-size:var(--text-xs);color:var(--color-text-muted);align-self:center;">Firebase entegrasyonu yakında</span>
            </div>
          </div>
        </div>
      `;
      detailArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    window.saveNote = function(btn) {
      const textarea = btn.closest('.knowledge-note-area').querySelector('textarea');
      if (textarea.value.trim()) {
        btn.textContent = 'Kaydedildi';
        btn.disabled = true;
        setTimeout(() => { btn.textContent = 'Not Ekle'; btn.disabled = false; }, 2000);
      }
    };

  </script>
</body>
</html>
