<!DOCTYPE html>
<!--
  login.html
  Ajans Paneli — Giriş Sayfası
  Firebase Authentication ile e-posta/şifre ve Google girişi destekler.
  Kimlik doğrulama mantığı js/auth.js dosyasında yönetilir.
-->
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Dark Space — Kişisel bilgi ve gelişim platformu">
  <meta name="theme-color" content="#08080d">
  <title>Giriş Yap — Dark Space</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/design-system.css?v=7">
  <link rel="stylesheet" href="css/components.css?v=7">
  <link rel="stylesheet" href="css/pages.css?v=7">
</head>
<body>

  <!-- Mesh Gradient Ambient Arka Plan -->
  <div class="ambient-bg" aria-hidden="true">
    <div class="ambient-orb ambient-orb--purple"></div>
    <div class="ambient-orb ambient-orb--blue"></div>
  </div>

  <!-- ============================================================
       GİRİŞ SAYFASI
       ============================================================ -->
  <div class="login-page">

    <div class="login-card">

      <!-- Logo ve Başlık -->
      <div class="login-logo">
        <div class="login-logo-icon">
          <!-- Panel logosu — Bolt / Enerji ikonu -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
          </svg>
        </div>
        <div>
          <div class="login-app-name">DARK SPACE</div>
          <div class="login-app-tagline">Bilgi. Takip. Gelişim.</div>
        </div>
      </div>

      <!-- Giriş Formu -->
      <form class="login-form" id="login-form" novalidate>

        <!-- E-posta -->
        <div class="form-group">
          <label for="email" class="form-label required">E-posta Adresi</label>
          <div class="search-wrap">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect width="20" height="16" x="2" y="4" rx="2"/>
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
            <input
              class="input search-input"
              type="email"
              id="login-email"
              name="email"
              placeholder="ornek@ajans.com"
              autocomplete="email"
              required
            >
          </div>
          <span class="form-error" id="emailError" style="display:none;"></span>
        </div>

        <!-- Şifre -->
        <div class="form-group">
          <label for="password" class="form-label required">Şifre</label>
          <div class="search-wrap">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input
              class="input search-input"
              type="password"
              id="login-password"
              name="password"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            >
          </div>
          <span class="form-error" id="passwordError" style="display:none;"></span>
        </div>

        <!-- Hata mesajı alanı -->
        <div id="login-error" class="alert alert-error" style="display:none;" role="alert">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" x2="12" y1="8" y2="12"/>
            <line x1="12" x2="12.01" y1="16" y2="16"/>
          </svg>
          <span id="loginErrorText">Giriş yapılamadı. Bilgilerinizi kontrol edin.</span>
        </div>

        <!-- Giriş Butonu -->
        <button type="submit" class="btn btn-primary btn-full btn-lg login-submit-btn" id="loginBtn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
            <polyline points="10 17 15 12 10 7"/>
            <line x1="15" x2="3" y1="12" y2="12"/>
          </svg>
          Giriş Yap
        </button>

      </form>

      <!-- Ayırıcı -->
      <div class="login-divider">
        <span>veya</span>
      </div>

      <!-- Google ile Giriş -->
      <button type="button" class="btn btn-google" id="google-login-btn">
        <!-- Google SVG logosu — inline, CDN yok -->
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.205c0-.639-.057-1.252-.164-1.841H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Google ile Giriş Yap
      </button>

      <!-- Footer -->
      <div class="login-footer">
        <p>Sadece yetkili erişim &mdash; tek kullanıcı sistemi</p>
      </div>

    </div><!-- /login-card -->

  </div><!-- /login-page -->

  <!-- ============================================================
       FIREBASE + JS
       ============================================================ -->
  <script type="module">
    import { initLoginPage } from './js/auth.js';
    initLoginPage();
  </script>

</body>
</html>
